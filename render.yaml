# render.yaml — Configuração do deploy do backend FastAPI no Render
services:
  - type: web
    name: intellidoc-api
    runtime: python
    buildCommand: sudo apt-get install -y tesseract-ocr tesseract-ocr-por tesseract-ocr-eng libgl1 && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
